- Media Management:
    - Radarr:
        icon: radarr
        href: http://radarr.localhost:8088
        description: Movie management
        server: my-docker
        container: radarr
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"

    - Sonarr:
        icon: sonarr
        href: http://sonarr.localhost:8088
        description: TV show management
        server: my-docker
        container: sonarr
