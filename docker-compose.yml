###############################################
# BAZARR - Subtitles
###############################################
  # bazarr:
  #   <<: *common-keys
  #   container_name: bazarr
  #   image: ghcr.io/hotio/bazarr:latest
  #   ports:
  #     - "6767:6767"
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - ${APPDATA_ROOT:-/docker/appdata}/bazarr:/config
  #     - ${MEDIA_ROOT:-/data}/media:/data/media

###############################################
# PROWLARR - Indexer Manager
###############################################
  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/prowlarr:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:9696/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# QBITTORRENT - Downloader
###############################################
  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
      LIBTORRENT: v2
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/qbittorrent:/config
      - ${MEDIA_ROOT:-/data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:8080/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  profilarr:
    <<: *common-keys
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    volumes:
      - ./profilarr/config:/config
    ports:
      - "6868:6868"
    depends_on:
      - sonarr
      - radarr
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:6868/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    pid: host
    network_mode: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro


###############################################
# JELLYFIN - Media Server
###############################################
  jellyfin:
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    group_add:
      - "992"  # render
      - "44"   # video
    # Requires the native Linux Docker daemon; Docker Desktop's VM cannot see the host /dev/dri nodes.
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "8096:8096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/jellyfin:/config
      - ${MEDIA_ROOT:-/data}/media:/data/media:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://127.0.0.1:8096/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdarr:
    <<: *common-keys
    image: ghcr.io/haveagitgat/tdarr
    container_name: tdarr
    group_add:
      - "992"  # render
      - "44"   # video
    ports:
      - "8265:8265" # Web UI
      - "8266:8266" # Server node port
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: true
      nodeName: N150_Worker
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/tdarr/server:/app/server
      - ${APPDATA_ROOT:-/docker/appdata}/tdarr/configs:/app/configs
      - ${APPDATA_ROOT:-/docker/appdata}/tdarr/logs:/app/logs
      - ${MEDIA_ROOT:-/data}/media:/data/media
      - ${TDARR_TRANSCODE_ROOT:-/tmp/tdarr-transcode}:/temp
    devices:
      # This explicitly grants access to the Intel Quick Sync GPU
      - /dev/dri:/dev/dri
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://127.0.0.1:8265/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
###############################################
# TAILSCALE - Secure Remote Access for Jellyfin
###############################################
  tailscale-jellyfin:
    container_name: tailscale-jellyfin
    image: tailscale/tailscale:latest
    restart: unless-stopped
    network_mode: "service:jellyfin"  # Shares Jellyfin's network namespace
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=jellyfin-media-server
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
    volumes:
      - tailscale-jellyfin-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - jellyfin
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# FLARESOLVERR - Cloudflare Bypass
###############################################
  flaresolverr:
    <<: *common-keys
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8191/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# SEERR - Media Request and Discovery
###############################################
  seerr:
    <<: *common-keys
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    ports:
      - "5055:5055"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/seerr:/app/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5055/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s


###############################################
# ADGUARDHOME - DNS & Ad-blocking
###############################################
  adguardhome:
    <<: *common-keys
    container_name: adguardhome
    image: adguard/adguardhome:latest
    ports:
      - "192.168.0.19:53:53/tcp"
      - "192.168.0.19:53:53/udp"
      - "100.104.142.22:53:53/tcp"
      - "100.104.142.22:53:53/udp"
      - "3000:3000/tcp"
      - "8085:80/tcp"
    volumes:
      - ${APPDATA_ROOT:-/docker/appdata}/adguardhome/work:/opt/adguardhome/work
      - ${APPDATA_ROOT:-/docker/appdata}/adguardhome/conf:/opt/adguardhome/conf
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# BESZEL - Resource Monitoring Hub & Agent
###############################################
  beszel:
    <<: *common-keys
    container_name: beszel
    image: henrygd/beszel:latest
    ports:
      - "8090:8090"
    volumes:
      - ${APPDATA_ROOT:-/docker/appdata}/beszel:/beszel_data
      - beszel_socket:/beszel_socket
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 10s

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent-intel
    restart: unless-stopped
    network_mode: host
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
      - CAP_PERFMON
    devices:
      - /dev/sda:/dev/sda
      - /dev/nvme0:/dev/nvme0
      - /dev/nvme0n1:/dev/nvme0n1
      - /dev/dri:/dev/dri
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_socket:/beszel_socket
    environment:
      PORT: 45876
      LISTEN: /beszel_socket/beszel.sock
      KEY: ${BESZEL_KEY:-}
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 10s

###############################################
# HOMEPAGE - Dashboard
###############################################
  homepage:
    <<: *common-keys
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    user: "root"
    group_add:
      - "984"
    ports:
      - "3005:3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_RADARR_API_KEY: ${RADARR_API_KEY:-}
      HOMEPAGE_VAR_SONARR_API_KEY: ${SONARR_API_KEY:-}
      HOMEPAGE_VAR_PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      HOMEPAGE_VAR_JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      HOMEPAGE_VAR_SEERR_API_KEY: ${SEERR_API_KEY:-}
      HOMEPAGE_VAR_QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      HOMEPAGE_VAR_QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      HOMEPAGE_VAR_ADGUARD_USERNAME: ${ADGUARD_USERNAME:-admin}
      HOMEPAGE_VAR_ADGUARD_PASSWORD: ${ADGUARD_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# ARR Stack Dedicated Network
###############################################
volumes:
  tailscale-jellyfin-state:
  tailscale-radarr-state:
  tailscale-sonarr-state:
  tailscale-netdata-state:
  netdataconfig:
  netdatalib:
  netdatacache:
  beszel_socket:

networks:
  default:
    name: arr_network
