###############################################
# Common Keys for all apps
###############################################

x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment:
    PUID: 1000
    PGID: 1000
    TZ: Asia/Kolkata
  dns:
    - 1.1.1.1
    - 1.0.0.1

services:
###############################################
# RADARR - Movies
###############################################
  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - "7878:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/radarr:/config
      - ${MEDIA_ROOT:-/data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:7878/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# TAILSCALE - Secure Remote Access for Radarr
###############################################
  tailscale-radarr:
    container_name: tailscale-radarr
    image: tailscale/tailscale:latest
    restart: unless-stopped
    network_mode: "service:radarr"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=radarr-media-server
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
    volumes:
      - tailscale-radarr-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - radarr
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# SONARR - TV Shows
###############################################
  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - "8989:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/sonarr:/config
      - ${MEDIA_ROOT:-/data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:8989/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# TAILSCALE - Secure Remote Access for Sonarr
###############################################
  tailscale-sonarr:
    container_name: tailscale-sonarr
    image: tailscale/tailscale:latest
    restart: unless-stopped
    network_mode: "service:sonarr"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=sonarr-media-server
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
    volumes:
      - tailscale-sonarr-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - sonarr
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

###############################################
# LIDARR - Music
###############################################
  # lidarr:
  #   <<: *common-keys
