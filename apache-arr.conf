# Apache Reverse Proxy Configuration for ARR stack docker services

# Radarr
<VirtualHost *:80>
    ServerName radarr.localhost
    ServerAlias radarr.lan

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:7878/
    ProxyPassReverse / http://127.0.0.1:7878/

    ErrorLog ${APACHE_LOG_DIR}/radarr_error.log
    CustomLog ${APACHE_LOG_DIR}/radarr_access.log combined
</VirtualHost>

